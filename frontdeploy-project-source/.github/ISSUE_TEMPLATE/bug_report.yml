name: Bug report
description: Report a reproducible problem in Axiom Intelligence.
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the page, address/token example, and extension state.
      placeholder: |
        1. Open ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: Chrome version, OS, extension build, Axiom page.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: This report does not include private keys, seed phrases, browser cookies, or API secrets.
          required: true
